<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveScore Data Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* CSS Reset & Variables */
        :root {
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
            
            --bg-body: #FAFAFA;
            --bg-surface: #FFFFFF;
            --bg-surface-hover: #F9FAFB;
            --bg-subtle: #F3F4F6;
            
            --border-light: #E5E7EB;
            --border-base: #D1D5DB;
            --border-dark: #9CA3AF;
            
            --text-primary: #111827;
            --text-secondary: #4B5563;
            --text-tertiary: #6B7280;
            
            --brand-primary: #000000;
            --brand-primary-hover: #1F2937;
            
            --status-success-bg: #ECFDF5;
            --status-success-text: #065F46;
            --status-success-border: #A7F3D0;
            
            --status-error-bg: #FEF2F2;
            --status-error-text: #991B1B;
            --status-error-border: #FECACA;
            
            --shadow-xs: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-float: 0 0 0 1px rgba(0,0,0,0.03), 0 2px 8px rgba(0,0,0,0.04), 0 16px 32px rgba(0,0,0,0.04);
            
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 4rem 1.5rem;
            background-image: radial-gradient(circle at center top, #FFFFFF 0%, transparent 60%);
        }

        /* Layout */
        .app-wrapper {
            width: 100%;
            max-width: 860px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Header */
        .app-header {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .app-logo {
            width: 48px;
            height: 48px;
            background: var(--brand-primary);
            color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-sm);
        }

        .app-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--text-primary);
        }

        .subtitle {
            font-size: 0.9375rem;
            color: var(--text-secondary);
            margin-top: 0.125rem;
        }

        /* Global Messages */
        .error-message {
            background: var(--status-error-bg);
            color: var(--status-error-text);
            border: 1px solid var(--status-error-border);
            padding: 1rem 1.25rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 500;
            display: none;
            align-items: center;
            box-shadow: var(--shadow-xs);
            animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .error-message.visible { display: flex; }

        .completion-message {
            background: var(--status-success-bg);
            color: var(--status-success-text);
            border: 1px solid var(--status-success-border);
            padding: 1rem 1.25rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 600;
            margin-top: 1.5rem;
            display: none;
            justify-content: center;
            align-items: center;
            box-shadow: var(--shadow-xs);
            animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .completion-message.visible { display: flex; }

        /* Cards */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-float);
            padding: 2rem;
        }

        /* Input Section */
        .input-section {
            position: relative;
        }

        /* Tabs (Segmented Control) */
        .tabs {
            display: inline-flex;
            background: var(--bg-subtle);
            padding: 0.25rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            gap: 0.25rem;
        }

        .tab {
            background: transparent;
            border: none;
            padding: 0.5rem 1.25rem;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            border-radius: 0.375rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab:hover { color: var(--text-primary); }

        .tab.active {
            background: var(--bg-surface);
            color: var(--text-primary);
            box-shadow: var(--shadow-sm);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active { display: block; }

        /* Form Elements */
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.625rem;
        }

        textarea {
            width: 100%;
            min-height: 180px;
            background: #FAFAFA;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 1rem;
            font-family: var(--font-mono);
            font-size: 0.875rem;
            line-height: 1.6;
            color: var(--text-primary);
            resize: vertical;
            transition: all 0.2s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        textarea:focus {
            outline: none;
            background: var(--bg-surface);
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 1px var(--brand-primary);
        }

        textarea::placeholder {
            color: var(--border-dark);
        }

        /* File Upload */
        .file-input-wrapper {
            position: relative;
            border: 2px dashed var(--border-light);
            border-radius: var(--radius-md);
            padding: 2.5rem 1.5rem;
            text-align: center;
            background: #FAFAFA;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .file-input-wrapper:hover {
            border-color: var(--brand-primary);
            background: var(--bg-surface);
        }

        .file-input-wrapper svg {
            color: var(--text-tertiary);
            margin-bottom: 0.75rem;
            transition: color 0.2s;
        }

        .file-input-wrapper:hover svg {
            color: var(--brand-primary);
        }

        .file-input-wrapper span.main-text {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .file-input-wrapper span.sub-text {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            margin-top: 0.25rem;
        }

        input[type="file"] {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-name {
            margin-top: 1rem;
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--brand-primary);
            background: var(--bg-subtle);
            padding: 0.375rem 0.875rem;
            border-radius: 9999px;
            display: none;
            border: 1px solid var(--border-light);
        }

        .file-name.visible { display: inline-block; }

        .hint {
            font-size: 0.8125rem;
            color: var(--text-tertiary);
            margin-top: 0.625rem;
        }

        /* Buttons */
        button#scrapeBtn {
            background: var(--brand-primary);
            color: white;
            border: none;
            width: 100%;
            padding: 0.875rem 1.5rem;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 0.9375rem;
            font-weight: 600;
            margin-top: 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        button#scrapeBtn:hover:not(:disabled) {
            background: var(--brand-primary-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        button#scrapeBtn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Progress Section */
        .progress-section {
            display: none;
            animation: fadeSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .progress-section.active { display: block; }

        .progress-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
        }

        .progress-title span:first-child {
            display: flex;
            align-items: center;
        }

        .progress-bar {
            height: 6px;
            background: var(--bg-subtle);
            border-radius: 999px;
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
        }

        .progress-fill {
            height: 100%;
            background: var(--brand-primary);
            width: 0%;
            border-radius: 999px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--border-light);
            border-top-color: var(--brand-primary);
            border-radius: 50%;
            margin-right: 0.625rem;
            animation: spin 1s linear infinite;
        }

        /* Results Section */
        .results-section {
            display: none;
            animation: fadeSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .results-section.active { display: block; }

        .toolbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1rem;
        }

        #downloadAllBtn {
            background: var(--bg-surface);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        #downloadAllBtn:hover {
            background: var(--bg-surface-hover);
            border-color: var(--border-base);
        }

        #resultsList {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .result-item {
            background: var(--bg-surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-xs);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: border-color 0.2s ease;
        }

        .result-item:hover {
            border-color: var(--border-base);
        }

        .result-item.error {
            border-color: var(--status-error-border);
            background: #FFFCFC;
        }

        @media (min-width: 640px) {
            .result-item {
                flex-direction: row;
                justify-content: space-between;
                align-items: flex-start;
            }
        }

        .result-info {
            flex: 1;
            min-width: 0;
        }

        .result-name {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
            letter-spacing: -0.01em;
        }

        .result-status {
            font-size: 0.875rem;
            color: var(--status-success-text);
            font-weight: 500;
            display: flex;
            align-items: center;
        }

        .result-status.error {
            color: var(--status-error-text);
        }

        .download-btn {
            background: var(--bg-surface);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            box-shadow: var(--shadow-sm);
        }

        .download-btn:hover {
            background: var(--bg-surface-hover);
            border-color: var(--border-base);
        }

        .result-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        @media (min-width: 640px) {
            .result-actions {
                justify-content: flex-end;
                min-width: 180px;
            }
        }

        .collapsible-section {
            margin-top: 1rem;
        }

        .section-toggle {
            width: 100%;
            background: var(--bg-surface);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 0.625rem 0.875rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            font-family: inherit;
            font-size: 0.8125rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .section-toggle:hover {
            background: var(--bg-surface-hover);
            border-color: var(--border-base);
        }

        .section-toggle.expanded {
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
        }

        .section-toggle-meta {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-tertiary);
        }

        .section-toggle-icon {
            width: 1.2rem;
            height: 1.2rem;
            border: 1px solid var(--border-light);
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-body);
            font-size: 0.875rem;
            line-height: 1;
        }

        .section-toggle-icon::before {
            content: '+';
            font-weight: 700;
        }

        .section-toggle.expanded .section-toggle-icon::before {
            content: '-';
        }

        .collapsible-content {
            display: none;
            border: 1px solid var(--border-light);
            border-top: none;
            border-bottom-left-radius: var(--radius-md);
            border-bottom-right-radius: var(--radius-md);
            background: var(--bg-surface);
            padding: 1rem;
        }

        .collapsible-content.open {
            display: block;
        }

        /* Generated Analysis injected by JS */
        .analysis-box {
            padding: 1rem;
            background: var(--bg-body);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-light);
        }

        .analysis-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 800;
            color: var(--text-secondary);
            margin-bottom: 1.25rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
        }

        .analysis-section-title {
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
        }

        .analysis-note {
            font-size: 0.8125rem;
            color: var(--text-tertiary);
            line-height: 1.5;
        }

        .market-list {
            display: grid;
            gap: 0.5rem;
        }

        @media (min-width: 768px) {
            .market-list {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .market-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.625rem 0.875rem;
            border-radius: 0.375rem;
            font-size: 0.8125rem;
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .market-item.best-bet {
            background: var(--status-success-bg);
            color: var(--status-success-text);
            border: 1px solid var(--status-success-border);
        }

        .market-item.mid-tier {
            background: var(--bg-surface);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
        }

        .market-item.rare {
            background: var(--status-error-bg);
            color: var(--status-error-text);
            border: 1px solid var(--status-error-border);
        }

        .market-item .rate {
            font-variant-numeric: tabular-nums;
            font-weight: 700;
        }

        .averages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 0.75rem;
            margin-top: 0.75rem;
        }

        .average-item {
            background: var(--bg-surface);
            border: 1px solid var(--border-light);
            padding: 0.75rem 1rem;
            border-radius: 0.375rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            box-shadow: var(--shadow-xs);
        }

        .average-item .avg-label {
            font-size: 0.6875rem;
            text-transform: uppercase;
            color: var(--text-tertiary);
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .average-item .avg-value {
            font-size: 1.125rem;
            font-weight: 800;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            font-family: var(--font-mono);
        }

        .table-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
            font-size: 0.75rem;
            color: var(--text-tertiary);
            margin-bottom: 0.625rem;
            font-weight: 600;
        }

        .table-wrap {
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            overflow: auto;
            max-height: 360px;
            background: var(--bg-surface);
        }

        .csv-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            min-width: 900px;
        }

        .csv-table thead th {
            position: sticky;
            top: 0;
            z-index: 1;
            background: var(--bg-subtle);
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.03em;
            font-size: 0.6875rem;
            text-align: left;
            padding: 0.625rem 0.75rem;
            border-bottom: 1px solid var(--border-light);
            white-space: nowrap;
        }

        .csv-table tbody td {
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border-light);
            color: var(--text-primary);
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        .csv-table tbody tr:nth-child(even) {
            background: #fcfcfd;
        }

        .csv-table tbody tr:hover {
            background: #f8fafc;
        }

        .row-index {
            color: var(--text-tertiary);
            font-weight: 700;
        }

        /* Animations */
        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            0% { opacity: 0; transform: translateY(-8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <header class="app-header">
            <div class="app-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                    <line x1="8" y1="21" x2="16" y2="21"></line>
                    <line x1="12" y1="17" x2="12" y2="21"></line>
                </svg>
            </div>
            <div>
                <h1>Data Extractor</h1>
                <p class="subtitle">Extract, analyze, and export LiveScore match statistics.</p>
            </div>
        </header>

        <div class="error-message" id="errorMessage"></div>

        <main class="card input-section">
            <div class="tabs">
                <button class="tab active" data-tab="text">Raw URLs</button>
                <button class="tab" data-tab="file">Upload File</button>
            </div>

            <div class="tab-content active" id="text-tab">
                <label for="urlsText">Target URLs</label>
                <textarea 
                    id="urlsText" 
                    placeholder="https://www.livescore.com/en/football/team/real-madrid/4009/results/&#10;https://www.livescore.com/en/football/team/manchester-city/6599/results/"></textarea>
                <p class="hint">Paste LiveScore team results URLs, one per line.</p>
            </div>

            <div class="tab-content" id="file-tab">
                <label for="urlsFile">Batch Upload</label>
                <div class="file-input-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" x2="12" y1="3" y2="15"/>
                    </svg>
                    <span class="main-text">Click to upload or drag and drop</span>
                    <span class="sub-text">.txt or .csv files, one URL per line</span>
                    <input type="file" id="urlsFile" accept=".txt,.csv">
                    <div class="file-name" id="fileName"></div>
                </div>
            </div>

            <button id="scrapeBtn" onclick="startScraping()">Start Scraping</button>
        </main>

        <div class="card progress-section" id="progressSection">
            <div class="progress-item">
                <div class="progress-title">
                    <span><span class="spinner"></span>Processing Data...</span>
                    <span id="progressText">0/0</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
        </div>

        <div class="results-section" id="resultsSection">
            <div class="toolbar">
                <button id="downloadAllBtn" onclick="downloadAllCsvs()" style="display:none;">Download All CSVs (ZIP)</button>
            </div>
            <div id="resultsList"></div>
            <div class="completion-message" id="completionMessage">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                All URLs processed successfully
            </div>
        </div>
    </div>

    <script>
        let currentJobId = null;
        let pollInterval = null;
        let autoDownloadedJobId = null;
        let pollFailureCount = 0;

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                e.target.classList.add('active');
                document.getElementById(`${e.target.dataset.tab}-tab`).classList.add('active');
            });
        });

        // File input display
        document.getElementById('urlsFile').addEventListener('change', (e) => {
            const fileName = document.getElementById('fileName');
            if (e.target.files.length > 0) {
                fileName.textContent = `📄 ${e.target.files[0].name}`;
                fileName.classList.add('visible');
            } else {
                fileName.classList.remove('visible');
            }
        });

        async function getUrls() {
            const activeTab = document.querySelector('.tab.active').dataset.tab;
            let urls = [];

            if (activeTab === 'text') {
                const text = document.getElementById('urlsText').value;
                urls = text.split('\n')
                    .map(url => url.trim())
                    .filter(url => url.length > 0);
            } else {
                const file = document.getElementById('urlsFile').files[0];
                if (!file) {
                    showError('Please select a file');
                    return [];
                }
                const text = await file.text();
                urls = text.split('\n')
                    .map(url => url.trim())
                    .filter(url => url.length > 0);
            }

            return urls;
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = 'Error: ' + message;
            errorDiv.classList.add('visible');
            setTimeout(() => {
                errorDiv.classList.remove('visible');
            }, 5000);
        }

        async function startScraping() {
            const scrapeBtn = document.getElementById('scrapeBtn');
            const urls = await getUrls();

            if (urls.length === 0) {
                showError('Please enter at least one URL');
                return;
            }

            scrapeBtn.disabled = true;
            scrapeBtn.textContent = 'Processing...';

            try {
                const response = await fetch('/api/scrape', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ urls })
                });

                if (!response.ok) {
                    const error = await response.json();
                    showError(error.detail || 'Failed to start scraping');
                    scrapeBtn.disabled = false;
                    scrapeBtn.textContent = 'Start Scraping';
                    return;
                }

                const data = await response.json();
                currentJobId = data.job_id;
                pollFailureCount = 0;

                document.getElementById('progressSection').classList.add('active');
                document.getElementById('resultsSection').classList.remove('active');
                document.getElementById('completionMessage').classList.remove('visible');

                pollProgress();
                pollInterval = setInterval(pollProgress, 2000);

            } catch (error) {
                showError('Connection error: ' + error.message);
                scrapeBtn.disabled = false;
                scrapeBtn.textContent = 'Start Scraping';
            }
        }

        async function pollProgress() {
            if (!currentJobId) return;

            try {
                const response = await fetch(`/api/job/${currentJobId}`);
                if (!response.ok) {
                    pollFailureCount += 1;

                    if (response.status === 404) {
                        clearInterval(pollInterval);
                        pollInterval = null;
                        currentJobId = null;
                        document.getElementById('progressSection').classList.remove('active');
                        document.getElementById('scrapeBtn').disabled = false;
                        document.getElementById('scrapeBtn').textContent = 'Start Scraping';
                        showError('Previous job not found (server restarted or job expired). Start a new scraping run.');
                        return;
                    }

                    if (pollFailureCount >= 5) {
                        clearInterval(pollInterval);
                        pollInterval = null;
                        document.getElementById('scrapeBtn').disabled = false;
                        document.getElementById('scrapeBtn').textContent = 'Start Scraping';
                        showError('Unable to fetch job status repeatedly. Please try again.');
                    }
                    return;
                }

                pollFailureCount = 0;

                const job = await response.json();
                updateProgress(job);

                if (job.status === 'completed') {
                    clearInterval(pollInterval);
                    pollInterval = null;
                    showResults(job);
                    document.getElementById('scrapeBtn').disabled = false;
                    document.getElementById('scrapeBtn').textContent = 'Start Scraping';
                } else if (job.status === 'failed') {
                    clearInterval(pollInterval);
                    pollInterval = null;
                    showError(job.error || 'An error occurred during scraping');
                    document.getElementById('scrapeBtn').disabled = false;
                    document.getElementById('scrapeBtn').textContent = 'Start Scraping';
                    document.getElementById('progressSection').classList.remove('active');
                }
            } catch (error) {
                pollFailureCount += 1;
                if (pollFailureCount >= 5) {
                    clearInterval(pollInterval);
                    pollInterval = null;
                    document.getElementById('scrapeBtn').disabled = false;
                    document.getElementById('scrapeBtn').textContent = 'Start Scraping';
                    document.getElementById('progressSection').classList.remove('active');
                    showError('Network error while polling job status. Please restart scraping.');
                }
                console.error('Poll error:', error);
            }
        }

        function updateProgress(job) {
            const percentage = (job.progress / job.total) * 100;
            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressText').textContent = `${job.progress}/${job.total}`;
        }

        function showResults(job) {
            document.getElementById('progressSection').classList.remove('active');
            document.getElementById('resultsSection').classList.add('active');
            const downloadAllBtn = document.getElementById('downloadAllBtn');
            downloadAllBtn.style.display = Object.keys(job.results).length > 0 ? 'inline-block' : 'none';

            const resultsList = document.getElementById('resultsList');
            resultsList.innerHTML = '';

            // Show successes
            Object.entries(job.results).forEach(([teamName, data]) => {
                const analysis = job.analyses && job.analyses[teamName] ? job.analyses[teamName] : null;
                const encodedTeamName = encodeURIComponent(teamName);
                const resultItem = document.createElement('div');
                resultItem.className = 'result-item';
                resultItem.innerHTML = `
                    <div class="result-info">
                        <div class="result-name">${escapeHtml(teamName)}</div>
                        <div class="result-status">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            ${data.length} matches collected
                        </div>
                        ${renderAnalysis(analysis)}
                        ${renderCsvDataTable(data)}
                    </div>
                    <div class="result-actions">
                        <button class="download-btn" onclick="downloadCsv('${currentJobId}', '${encodedTeamName}')">
                            Download CSV
                        </button>
                    </div>
                `;
                resultsList.appendChild(resultItem);
            });

            // Show errors
            Object.entries(job.errors).forEach(([teamName, error]) => {
                const resultItem = document.createElement('div');
                resultItem.className = 'result-item error';
                resultItem.innerHTML = `
                    <div class="result-info">
                        <div class="result-name">${escapeHtml(teamName)}</div>
                        <div class="result-status error">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            ${escapeHtml(error)}
                        </div>
                    </div>
                `;
                resultsList.appendChild(resultItem);
            });

            if (Object.keys(job.results).length > 0) {
                document.getElementById('completionMessage').classList.add('visible');
            }
        }

        function renderAnalysis(analysis) {
            let analysisHtml = '';

            if (!analysis) {
                analysisHtml = `<div class="analysis-box"><div class="analysis-note">No analysis available.</div></div>`;
                return renderCollapsibleSection('Betting Analysis', analysisHtml, false);
            }

            if (analysis.summary) {
                analysisHtml = `<div class="analysis-box"><div class="analysis-note">${escapeHtml(analysis.summary)}</div></div>`;
                return renderCollapsibleSection('Betting Analysis', analysisHtml, false);
            }

            const markets = analysis.markets || {};
            const averages = analysis.averages || {};
            const sample = analysis.sample_size || 0;

            // Sort markets
            const sortedMarkets = Object.entries(markets).sort((a, b) => b[1] - a[1]);
            
            const bestBets = sortedMarkets.filter(m => m[1] >= 75);
            const midTier = sortedMarkets.filter(m => m[1] >= 40 && m[1] < 75);
            const rare = sortedMarkets.filter(m => m[1] < 40);

            analysisHtml = `<div class="analysis-box">`;
            analysisHtml += `<div class="analysis-title">Comprehensive Betting Analysis &nbsp;&middot;&nbsp; Matches: ${sample}</div>`;

            // SECTION A: THE BEST BETS
            analysisHtml += `<div class="analysis-section-title">The 'Best Bets' (Hit Rate >= 75%)</div>`;
            analysisHtml += `<div class="analysis-note" style="margin-bottom:12px;">Statistically the safest bets based on recent form.</div>`;
            if (bestBets.length > 0) {
                analysisHtml += `<div class="market-list">`;
                bestBets.forEach(([market, rate]) => {
                    analysisHtml += `<div class="market-item best-bet">
                                <span>${escapeHtml(market)}</span>
                                <span class="rate">${rate.toFixed(1)}%</span>
                             </div>`;
                });
                analysisHtml += `</div>`;
            } else {
                analysisHtml += `<div class="analysis-note">No extreme high-confidence trends found (>= 75%).</div>`;
            }

            // SECTION B: DETAILED HIT RATES
            analysisHtml += `<div class="analysis-section-title" style="margin-top:24px;">Detailed Hit Rates</div>`;
            analysisHtml += `<div class="market-list">`;
            midTier.forEach(([market, rate]) => {
                analysisHtml += `<div class="market-item mid-tier">
                            <span>${escapeHtml(market)}</span>
                            <span class="rate">${rate.toFixed(1)}%</span>
                         </div>`;
            });
            rare.forEach(([market, rate]) => {
                analysisHtml += `<div class="market-item rare">
                            <span>${escapeHtml(market)}</span>
                            <span class="rate">${rate.toFixed(1)}%</span>
                         </div>`;
            });
            analysisHtml += `</div>`;

            // SECTION C: STATISTICAL AVERAGES
            analysisHtml += `<div class="analysis-section-title" style="margin-top:24px;">Statistical Averages</div>`;
            analysisHtml += `<div class="averages-grid">`;
            Object.entries(averages).forEach(([stat, val]) => {
                if (val !== null && val !== undefined) {
                    analysisHtml += `<div class="average-item">
                                <span class="avg-label">${escapeHtml(stat)}</span>
                                <span class="avg-value">${val.toFixed(2)}</span>
                             </div>`;
                }
            });
            analysisHtml += `</div></div>`;

            return renderCollapsibleSection('Betting Analysis', analysisHtml, false);
        }

        function renderCsvDataTable(rows) {
            if (!Array.isArray(rows) || rows.length === 0) {
                const emptyHtml = '<div class="analysis-note">No match rows to display.</div>';
                return renderCollapsibleSection('CSV Data Table', emptyHtml, false);
            }

            const columns = getOrderedColumns(rows);
            const headerHtml = columns.map(col => `<th>${escapeHtml(humanizeHeader(col))}</th>`).join('');
            const bodyHtml = rows.map((row, index) => {
                const cells = columns.map(col => `<td>${escapeHtml(formatCellValue(row[col]))}</td>`).join('');
                return `<tr><td class="row-index">${index + 1}</td>${cells}</tr>`;
            }).join('');

            const tableHtml = `
                <div class="table-meta">
                    <span>Rows: ${rows.length}</span>
                    <span>Columns: ${columns.length}</span>
                </div>
                <div class="table-wrap">
                    <table class="csv-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                ${headerHtml}
                            </tr>
                        </thead>
                        <tbody>
                            ${bodyHtml}
                        </tbody>
                    </table>
                </div>
            `;

            return renderCollapsibleSection('CSV Data Table', tableHtml, false);
        }

        function getOrderedColumns(rows) {
            const preferredColumns = [
                'match_url',
                'team_name',
                'opponent_name',
                'match_date',
                'competition',
                'home_away',
                'team_score',
                'opponent_score'
            ];

            const allColumns = [];
            const seen = new Set();

            rows.forEach(row => {
                Object.keys(row || {}).forEach(key => {
                    if (!seen.has(key)) {
                        seen.add(key);
                        allColumns.push(key);
                    }
                });
            });

            const preferred = preferredColumns.filter(col => seen.has(col));
            const remaining = allColumns
                .filter(col => !preferredColumns.includes(col))
                .sort((a, b) => a.localeCompare(b));

            return preferred.concat(remaining);
        }

        function humanizeHeader(value) {
            return String(value || '')
                .replace(/_/g, ' ')
                .replace(/\s+/g, ' ')
                .trim()
                .replace(/\b\w/g, c => c.toUpperCase());
        }

        function formatCellValue(value) {
            if (value === null || value === undefined || value === '') return 'N/A';
            return String(value);
        }

        function renderCollapsibleSection(title, contentHtml, defaultExpanded) {
            const expanded = defaultExpanded === true;
            return `
                <div class="collapsible-section">
                    <button
                        type="button"
                        class="section-toggle ${expanded ? 'expanded' : ''}"
                        aria-expanded="${expanded ? 'true' : 'false'}"
                        onclick="toggleSection(this)"
                    >
                        <span>${escapeHtml(title)}</span>
                        <span class="section-toggle-meta">
                            <span class="section-toggle-text">${expanded ? 'Hide' : 'Show'}</span>
                            <span class="section-toggle-icon" aria-hidden="true"></span>
                        </span>
                    </button>
                    <div class="collapsible-content ${expanded ? 'open' : ''}">
                        ${contentHtml}
                    </div>
                </div>
            `;
        }

        function toggleSection(button) {
            const content = button.nextElementSibling;
            const isExpanded = button.classList.toggle('expanded');
            button.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');

            const statusLabel = button.querySelector('.section-toggle-text');
            if (statusLabel) {
                statusLabel.textContent = isExpanded ? 'Hide' : 'Show';
            }

            if (content) {
                content.classList.toggle('open', isExpanded);
            }
        }

        function safeValue(v) {
            if (v === null || v === undefined || v === '') return 'N/A';
            return v;
        }

        function safePct(v) {
            if (v === null || v === undefined || v === '') return 'N/A';
            return `${v}%`;
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function triggerAutoDownloadAll(job) {
            if (!job || !job.job_id) return;
            if (Object.keys(job.results || {}).length === 0) return;
            if (autoDownloadedJobId === job.job_id) return;

            autoDownloadedJobId = job.job_id;
            downloadAllCsvs();
        }

        function downloadAllCsvs() {
            if (!currentJobId) return;
            window.location.href = `/api/download-all/${currentJobId}`;
        }

        function downloadCsv(jobId, encodedTeamName) {
            window.location.href = `/api/download/${jobId}/${encodedTeamName}`;
        }
    </script>
</body>
</html>
